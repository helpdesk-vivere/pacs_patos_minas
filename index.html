<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard - Prefeitura Patos de Minas</title>

<style>
body, html{
    margin:0;
    padding:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background:#f1f4f9;
    color:#333;
}

.header{
    background:#1f6f8b;
    color:#fff;
    padding:20px;
    text-align:center;
}

.header img{
    width:120px;
    margin-bottom:10px;
}

.header h1{
    margin:0;
    font-size:22px;
}

.header span{
    font-size:14px;
    opacity:0.9;
}

.container{
    padding:25px;
    max-width:1300px;
    margin:auto;
}

.kpis{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
    text-align:center;
}

.card h3{
    margin:0;
    font-size:14px;
    color:#777;
}

.card .numero{
    font-size:28px;
    font-weight:bold;
    margin-top:8px;
}

.table-container{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

th{
    text-align:left;
    padding:10px;
    background:#1f6f8b;
    color:#fff;
}

td{
    padding:8px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f9fbfd;
}
</style>
</head>
<body>

<div class="header">
    <img src="logo.jpg" alt="Logo Vivere Consultoria">
    <h1>PREFEITURA - PATOS DE MINAS</h1>
    <span>Vivere Consultoria | André Soares | Início: 13/02/2026</span>
</div>

<div class="container">

    <div class="kpis">
        <div class="card">
            <h3>Total de Atividades</h3>
            <div class="numero" id="total">0</div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Categoria</th>
                    <th>Atribuído a</th>
                    <th>Início</th>
                    <th>Dias</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

</div>

<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwSd6NMPlZXWF9aJdmnEaQtH9fYoIbMFM8xRd6Z9hMe1TEoJTh7OV87-CDxbi-WktlTfQ/exec";

function formatarDataBR(data){
    if(!data) return "";
    let d = new Date(data);
    if(isNaN(d)) return data;
    let dia = ("0"+d.getDate()).slice(-2);
    let mes = ("0"+(d.getMonth()+1)).slice(-2);
    let ano = d.getFullYear();
    return `${dia}/${mes}/${ano}`;
}

async function carregar(){
    let res = await fetch(URL_SCRIPT);
    let dados = await res.json();

    let tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    document.getElementById("total").innerText = dados.length;

    dados.forEach(d => {
        let tr = document.createElement("tr");

        const desc = (d.descricao || "").toUpperCase();

        // 🎨 Destaque por tipo
        if(desc.includes("SERVIÇOS DE APLICAÇÃO - PACS ADMIN") ||
           desc.includes("SERVIÇOS DE APLICAÇÃO - APLICAÇÃO CLINICA")){
            tr.style.backgroundColor = "#007bff30"; // azul claro
        }

        if(desc.includes("INICIO AMBIENTE GO-LIVE")){
            tr.style.backgroundColor = "#28a74530"; // verde claro
        }

        tr.innerHTML = `
            <td>${d.descricao}</td>
            <td>${d.categoria}</td>
            <td>${d.atribuido}</td>
            <td>${formatarDataBR(d.inicio)}</td>
            <td>${d.dias}</td>
        `;

        tbody.appendChild(tr);
    });
}

carregar();
setInterval(carregar,30000);
</script>

</body>
</html>
